version: "3.9"

services:
  api:
    build:
      context: ./api/
      dockerfile: Dockerfile
    working_dir: /usr/src/app/
    image: api
    container_name: api
    stdin_open: true
    tty: true
    links:
      - mongo
    ports:
      - 18802:18802
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENCLAW_PROXY_URL=http://host.docker.internal:18801
    volumes:
      - ./api/:/usr/src/app/
    command: /bin/sh -c 'npm install && npm run start'

  client:
    build:
      context: ./client/
      dockerfile: Dockerfile
      target: app
    working_dir: /usr/src/app/
    image: client
    container_name: client
    stdin_open: true
    tty: true
    ports:
      - 18800:18800
    volumes:
      - ./client/:/usr/src/app/
    command: /bin/sh -c 'npm install && npm run dev'

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    container_name: db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodbdata:/data/db

volumes:
  mongodbdata:

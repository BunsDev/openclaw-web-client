services:
  api:
    build:
      context: ./api/
      dockerfile: Dockerfile
    working_dir: /usr/src/app/
    image: api
    container_name: api
    stdin_open: true
    tty: true
    links:
      - mongo
    ports:
      - 18802:18802
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENCLAW_PROXY_URL=http://host.docker.internal:18801
    volumes:
      - ./api/:/usr/src/app/
      - api_node_modules:/usr/src/app/node_modules
    command: /bin/sh -c 'if ! cmp -s package-lock.json node_modules/.lockfile-cache; then npm install && cp package-lock.json node_modules/.lockfile-cache; fi && npm run start'

  client:
    build:
      context: ./client/
      dockerfile: Dockerfile
      target: app
    working_dir: /usr/src/app/
    image: client
    container_name: client
    stdin_open: true
    tty: true
    ports:
      - 18800:18800
    volumes:
      - ./client/:/usr/src/app/
      - client_node_modules:/usr/src/app/node_modules
    command: /bin/sh -c 'if ! cmp -s package-lock.json node_modules/.lockfile-cache; then npm install && cp package-lock.json node_modules/.lockfile-cache; fi && npm run dev'

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    container_name: db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodbdata:/data/db

volumes:
  mongodbdata:
  api_node_modules:
  client_node_modules:

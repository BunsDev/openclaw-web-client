paths: 
  /auth/token:
    get:
      tags:
        - auth
      security:
        - bearerAuth: []
      operationId: tokenCheck
      summary: Check token and return signed in user
      responses: 
        200:
          $ref: '#/components/responses/profile'
        500:
          $ref: '#/components/responses/500'
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
  /auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Login request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginReqBody'
      responses: 
        200:
          $ref: '#/components/responses/profileRes'
        500:
          $ref: '#/components/responses/500'
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
  /auth/logout:
    delete: 
      tags:
        - auth
      security:
        - bearerAuth: []
      operationId: logout
      summary: Logout a user
      responses: 
        200:
          $ref: '#/components/responses/empty'
        500:
          $ref: '#/components/responses/500'
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
#
#
#
components:
  ##
  responses:
    #
    profile:
      description: successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/profile'
    #
    profileRes:
      description: successful response
      headers:
        access-token:
          required: true
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/profile'
  ##
  schemas:
    #
    profile:
      type: object
      additionalProperties: false
      required:
      - _id
      - email
      - name
      - lastName
      - phone
      - active
      - createdAt
      - updatedAt
      properties:
        _id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        lastName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    #
    loginReqBody:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - token
      properties:
        email:
          type: string
          example: 'test@test.com'
        password:
          type: string
          example: '123456'
        token:
          type: string
          example: test_token_for_swagger
          description: use 'test_token_for_swagger' to pass recaptcha validation (only for dev)


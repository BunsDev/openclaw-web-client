paths:
  /message/conversation/{conversationId}:
    get:
      tags:
        - message
      security:
        - bearerAuth: []
      operationId: listMessagesByConversation
      summary: List all messages in a conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: integer
      responses:
        200:
          description: List of messages sorted by creation date (ascending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/messageListResponse'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /message:
    post:
      tags:
        - message
      security:
        - bearerAuth: []
      operationId: createMessage
      summary: Create a standalone message (no AI response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/messageReqBody'
      responses:
        200:
          description: Created message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
  /message/chat:
    post:
      tags:
        - message
      security:
        - bearerAuth: []
      operationId: chat
      summary: Send a message and stream the AI response via SSE
      description: >
        Saves the user message, forwards it (with optional file attachments)
        to the OpenClaw gateway, and streams the AI response back as
        Server-Sent Events. The assistant message is persisted once the
        stream completes.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/chatReqBody'
      responses:
        200:
          description: SSE stream of AI response deltas
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Each event is `data: {json}\n\n` where json has
                  `{ type: "response.output_text.delta" | "response.thinking.delta", delta: string }`.
                  Stream ends with `data: [DONE]\n\n`.
        404:
          description: Conversation not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
  /message/{id}:
    delete:
      tags:
        - message
      security:
        - bearerAuth: []
      operationId: deleteMessage
      summary: Soft-delete a message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          $ref: '#/components/responses/empty'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
#
#
#
components:
  ##
  schemas:
    #
    messageFile:
      type: object
      properties:
        filename:
          type: string
        originalName:
          type: string
        mimetype:
          type: string
        size:
          type: integer
        url:
          type: string
    #
    message:
      type: object
      properties:
        _id:
          type: integer
        conversationId:
          type: integer
        text:
          type: string
        thinking:
          type: string
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/messageFile'
        role:
          type: string
          enum: [user, assistant]
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
    #
    messageListResponse:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/message'
    #
    messageReqBody:
      type: object
      required:
        - conversationId
        - text
      properties:
        conversationId:
          type: integer
        text:
          type: string
    #
    chatReqBody:
      type: object
      required:
        - conversationId
      properties:
        conversationId:
          type: integer
          description: The conversation to send the message in.
        text:
          type: string
          description: The message text. At least one of text or files is required.
        files:
          type: array
          items:
            type: string
            format: binary
          description: Up to 5 file attachments (max 10MB each).

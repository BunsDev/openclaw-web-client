paths:
  /skill:
    get:
      tags:
        - skill
      security:
        - bearerAuth: []
      operationId: listSkills
      summary: List all available skills
      description: >
        Returns every registered OpenClaw skill with eligibility status,
        source, missing requirements, and metadata.
      responses:
        200:
          description: Array of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/skillInfo'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
#
#
#
components:
  ##
  schemas:
    #
    skillInfo:
      type: object
      properties:
        name:
          type: string
          example: 'github'
        description:
          type: string
          example: 'GitHub operations via gh CLI'
        emoji:
          type: string
          example: '🐙'
        eligible:
          type: boolean
          description: Whether all requirements are met
        disabled:
          type: boolean
        blockedByAllowlist:
          type: boolean
        source:
          type: string
          example: 'openclaw-bundled'
        bundled:
          type: boolean
        homepage:
          type: string
          nullable: true
          example: 'https://github.com'
        missing:
          type: object
          properties:
            bins:
              type: array
              items:
                type: string
            anyBins:
              type: array
              items:
                type: string
            env:
              type: array
              items:
                type: string
            config:
              type: array
              items:
                type: string
            os:
              type: array
              items:
                type: string

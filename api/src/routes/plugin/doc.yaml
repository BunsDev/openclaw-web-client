paths:
  /plugin:
    get:
      tags:
        - plugin
      security:
        - bearerAuth: []
      operationId: listPlugins
      summary: List all plugins
      description: >
        Returns every registered OpenClaw plugin (enabled and disabled) with
        status, origin, and the tools/hooks each plugin exposes.
      responses:
        200:
          description: Array of plugins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pluginInfo'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /plugin/{id}:
    post:
      tags:
        - plugin
      security:
        - bearerAuth: []
      operationId: togglePlugin
      summary: Enable or disable a plugin
      parameters:
        - $ref: '#/components/parameters/pluginId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/togglePluginBody'
      responses:
        200:
          description: Toggle result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/togglePluginResult'
        400:
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'enable (boolean) is required'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
#
#
#
components:
  ##
  parameters:
    pluginId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Plugin identifier
  ##
  schemas:
    #
    pluginInfo:
      type: object
      properties:
        id:
          type: string
          example: 'openclaw-plugin-web-search'
        name:
          type: string
          example: 'Web Search'
        description:
          type: string
          example: 'Search the web using DuckDuckGo'
        version:
          type: string
          example: '1.2.0'
        status:
          type: string
          enum: [loaded, error, disabled]
          example: 'loaded'
        origin:
          type: string
          enum: [bundled, installed, npm]
          example: 'bundled'
        enabled:
          type: boolean
          example: true
        toolNames:
          type: array
          items:
            type: string
          example: ['web_search', 'web_fetch']
        hookNames:
          type: array
          items:
            type: string
          example: ['onMessage']
    #
    togglePluginBody:
      type: object
      required:
        - enable
      properties:
        enable:
          type: boolean
          description: Set to true to enable the plugin, false to disable it
    #
    togglePluginResult:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        error:
          type: string
          nullable: true
          description: Present only when ok is false

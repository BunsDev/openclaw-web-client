paths:
  /agent:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: listAgents
      summary: List all agents
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            enum: [5, 10, 20, 40, 60, 100]
            default: 40
        - in: query
          name: sortField
          schema:
            type: string
            enum: [name, createdAt, updatedAt]
            default: createdAt
        - in: query
          name: sortType
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: search
          schema:
            type: string
      responses:
        200:
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agentListResponse'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
    post:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: createAgent
      summary: Create a new agent
      description: Creates an agent and registers it with the OpenClaw gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agentReqBody'
      responses:
        200:
          description: Created agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agent'
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
  /agent/sync:
    post:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: syncAgents
      summary: Sync agents, conversations, and messages from OpenClaw
      description: >
        Scans the OpenClaw filesystem for agents, sessions, and messages that
        are not yet in the local database and imports them.
      responses:
        200:
          description: Sync result counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/syncResponse'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /agent/models:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: listModels
      summary: List available AI models
      responses:
        200:
          description: List of model identifiers
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  models:
                    type: array
                    items:
                      type: string
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /agent/{id}:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: getAgent
      summary: Get an agent by ID
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        200:
          description: Agent object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agent'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
    patch:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: updateAgent
      summary: Update an agent's name
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agentUpdateBody'
      responses:
        200:
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agent'
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
    delete:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: deleteAgent
      summary: Soft-delete an agent and its conversations
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        200:
          $ref: '#/components/responses/empty'
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /agent/{id}/model:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: getAgentModel
      summary: Get the AI model assigned to an agent
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        200:
          description: Current model
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  model:
                    type: string
                    nullable: true
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
    patch:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: patchAgentModel
      summary: Change the AI model assigned to an agent
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
              properties:
                model:
                  type: string
                  example: 'o3-pro'
      responses:
        200:
          description: Model updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  model:
                    type: string
        400:
          description: Model is required
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /agent/{id}/workspace:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: getWorkspaceMeta
      summary: Get workspace metadata for an agent
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        200:
          description: Workspace metadata (file list, sizes, etc.)
          content:
            application/json:
              schema:
                type: object
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
  /agent/{id}/workspace/file/{filename}:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: getWorkspaceFile
      summary: Read a workspace file
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/workspaceFilename'
      responses:
        200:
          description: File content
          content:
            application/json:
              schema:
                type: object
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
    put:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: putWorkspaceFile
      summary: Write a workspace file
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/workspaceFilename'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: File content to write
      responses:
        200:
          description: Write result
          content:
            application/json:
              schema:
                type: object
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        422:
          $ref: '#/components/responses/422'
        500:
          $ref: '#/components/responses/500'
  /agent/{id}/workspace/uploads/{filename}:
    get:
      tags:
        - agent
      operationId: serveWorkspaceUpload
      summary: Serve a file uploaded to the agent workspace
      description: Returns the raw file. No authentication required.
      parameters:
        - $ref: '#/components/parameters/id'
        - in: path
          name: filename
          required: true
          schema:
            type: string
      responses:
        200:
          description: Raw file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        404:
          description: Agent or file not found
        500:
          $ref: '#/components/responses/500'
  /agent/{id}/conversation/{conversationId}/session-settings:
    get:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: getSessionSettings
      summary: Get session settings for a conversation
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/conversationId'
      responses:
        200:
          description: Session settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  settings:
                    type: object
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
    patch:
      tags:
        - agent
      security:
        - bearerAuth: []
      operationId: patchSessionSettings
      summary: Update session settings for a conversation
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/conversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary settings to merge into the session
      responses:
        200:
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
        404:
          description: Agent not found
        401:
          $ref: '#/components/responses/401'
        500:
          $ref: '#/components/responses/500'
#
#
#
components:
  ##
  parameters:
    id:
      in: path
      name: id
      required: true
      schema:
        type: integer
    conversationId:
      in: path
      name: conversationId
      required: true
      schema:
        type: integer
    workspaceFilename:
      in: path
      name: filename
      required: true
      schema:
        type: string
        enum: [AGENTS.md, SOUL.md, TOOLS.md, IDENTITY.md, USER.md, HEARTBEAT.md, BOOTSTRAP.md, MEMORY.md]
  ##
  schemas:
    #
    agent:
      type: object
      properties:
        _id:
          type: integer
        name:
          type: string
        openclawAgentId:
          type: string
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        model:
          type: string
          nullable: true
          description: Currently assigned AI model
    #
    agentListResponse:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/agent'
    #
    agentReqBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: 'Research Assistant'
        openclawAgentId:
          type: string
          example: 'research-assistant'
          description: Optional slug for the OpenClaw agent. Auto-generated from name if omitted.
        interactive:
          type: boolean
          description: If true, skip automatic gateway registration (for interactive setup flows).
    #
    agentUpdateBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: 'Updated Agent Name'
    #
    syncResponse:
      type: object
      properties:
        syncedAgents:
          type: integer
          description: Number of newly imported agents
        syncedConversations:
          type: integer
          description: Number of newly imported conversations
        syncedMessages:
          type: integer
          description: Number of newly imported messages
